<!DOCTYPE html>
<html>
<head>
  <title>YOLOv8 Object Detection</title>
  <style>
    body { text-align:center; background:#111; color:white; }
    video, canvas { width:60%; border-radius:10px; }
  </style>
</head>
<body>

<h1>Real-time Object Detection (YOLOv8)</h1>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

startCamera();

const ws = new WebSocket("wss://YOUR-RENDER-URL/ws");

ws.onopen = () => console.log("Connected to server");

ws.onmessage = (event) => {
    const { detections } = JSON.parse(event.data);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    detections.forEach(d => {
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.strokeRect(d.x1, d.y1, d.w, d.h);
        ctx.fillStyle = "black";
        ctx.fillText(`${d.label} ${Math.round(d.conf*100)}%`, d.x1, d.y1-5);
    });
};

setInterval(() => {
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    const tctx = tempCanvas.getContext("2d");
    tctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ws.send(JSON.stringify({ image: tempCanvas.toDataURL("image/jpeg") }));
}, 150);
</script>

</body>
</html>
