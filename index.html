<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YOLOv8 Real-Time Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #0a0a0a; color: white; overflow-x: hidden; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 2.5em; background: linear-gradient(45deg, #22c55e, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
    button { padding: 12px 24px; border: none; border-radius: 8px; background: #22c55e; color: white; font-size: 16px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
    button:hover { background: #16a34a; transform: translateY(-2px); }
    button:disabled { background: #6b7280; cursor: not-allowed; transform: none; }
    .cams { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .cam { background: #1a1a1a; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .cam video, .cam canvas { width: 100%; height: 400px; object-fit: cover; border-radius: 8px; }
    .stats { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 14px; }
    @media (max-width: 768px) { .cams { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: center; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦠 YOLOv8 Real-Time Detection</h1>
      <p>Live webcam inference • 80 COCO classes • FPS counter</p>
    </div>
    <div class="controls">
      <button id="startBtn">▶️ Start Camera</button>
      <button id="stopBtn" disabled>⏹️ Stop</button>
    </div>
    <div class="cams">
      <div class="cam">
        <h3>📹 Live Feed</h3>
        <video id="video" autoplay muted playsinline></video>
      </div>
      <div class="cam">
        <h3>🎯 Detection Output</h3>
        <canvas id="canvas"></canvas>
        <div id="stats" class="stats"></div>
      </div>
    </div>
  </div>

  <script>
    const COCO_CLASSES = ['person','bicycle','car','motorcycle','airplane','bus','train','truck','boat','traffic light','fire hydrant','stop sign','parking meter','bench','bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe','backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard','sports ball','kite','baseball bat','baseball glove','skateboard','surfboard','tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl','banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza','donut','cake','chair','couch','potted plant','bed','dining table','toilet','tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven','toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear','hair drier','toothbrush'];

    let stream = null, session = null, animationId = null;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statsEl = document.getElementById('stats');
    
    let lastTime = 0, frameCount = 0, fps = 0;

    async function init() {
      try {
        session = await ort.InferenceSession.create('./yolov8n.onnx', {
          executionProviders: ['wasm'], loggingLevel: 'error'
        });
        console.log('✅ YOLOv8 model loaded');
      } catch(e) {
        alert('Model load failed. Check console.');
        console.error(e);
      }
    }

    async function detect() {
      if (!session || video.videoWidth === 0) return requestAnimationFrame(detect);
      
      const img = preprocess(video);
      const feeds = { images: img };
      const results = await session.run(feeds);
      const detections = postprocess(results.output0.data, video.videoWidth, video.videoHeight);
      
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      drawBoxes(detections);
      
      // FPS counter
      const now = performance.now();
      frameCount++;
      if (now - lastTime >= 1000) {
        fps = Math.round(frameCount * 1000 / (now - lastTime));
        frameCount = 0; lastTime = now;
        statsEl.textContent = `FPS: ${fps} | Objects: ${detections.length}`;
      }
      
      animationId = requestAnimationFrame(detect);
    }

    function preprocess(video) {
      const [w, h] = [640, 640];
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const input = new Float32Array(w * h * 3);
      for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
        input[j] = data[i] / 255;     // R
        input[j + 1] = data[i + 1] / 255; // G
        input[j + 2] = data[i + 2] / 255; // B
      }
      return new ort.Tensor('float32', input, [1, 3, h, w]);
    }

    function postprocess(output, vw, vh) {
      const [_, __, num] = output.shape;
      const data = Array.from(output.data);
      const boxes = [], scores = [];
      
      for (let i = 0; i < num; i++) {
        const scores_i = data.slice(i * 84 + 4, i * 84 + 84);
        const maxIdx = scores_i.indexOf(Math.max(...scores_i));
        const score = scores_i[maxIdx];
        if (score > 0.25) {
          const cx = data[i * 84];
          const cy = data[i * 84 + 1];
          const w = data[i * 84 + 2];
          const h = data[i * 84 + 3];
          boxes.push([cx - w/2, cy - h/2, cx + w/2, cy + h/2, maxIdx, score]);
          scores.push(score);
        }
      }
      
      // Simple NMS
      const keep = [];
      const indices = scores.map((_, i) => i).sort((a,b) => scores[b] - scores[a]);
      while (indices.length) {
        const i = indices.shift();
        keep.push(i);
        indices.splice(1, indices.length, ...indices.filter(j => 
          iou(boxes[i], boxes[indices[0]]) < 0.45
        ));
      }
      return keep.map(i => ({
        bbox: boxes[i].slice(0,4).map(x => x * Math.min(vw,vh)/640),
        label: COCO_CLASSES[boxes[i][4]],
        conf: boxes[i][5]
      }));
    }

    function iou(box1, box2) {
      const [x1,y1,x2,y2] = box1;
      const [x1_,y1_,x2_,y2_] = box2;
      const xi1 = Math.max(x1, x1_), yi1 = Math.max(y1, y1_);
      const xi2 = Math.min(x2, x2_), yi2 = Math.min(y2, y2_);
      const inter = Math.max(0, xi2 - xi1) * Math.max(0, yi2 - yi1);
      return inter / ((x2-x1)*(y2-y1) + (x2_-x1_)*(y2_-y1_) - inter);
    }

    function drawBoxes(detections) {
      detections.forEach(({bbox: [x1,y1,x2,y2], label, conf}) => {
        const w = x2 - x1, h = y2 - y1;
        ctx.strokeStyle = `hsl(${Math.random()*360}, 70%, 50%)`;
        ctx.lineWidth = 3;
        ctx.strokeRect(x1, y1, w, h);
        ctx.fillStyle = ctx.strokeStyle;
        ctx.font = 'bold 20px Arial';
        ctx.fillText(`${label} ${(conf*100).toFixed(0)}% ${w.toFixed(0)}×${h.toFixed(0)}px`, x1, y1 - 5);
      });
    }

    startBtn.onclick = async () => {
      stream = await navigator.mediaDevices.getUserMedia({video: {width: 640, height: 640}});
      video.srcObject = stream;
      canvas.width = video.videoWidth = 640;
      canvas.height = video.videoHeight = 640;
      await new Promise(r => video.onloadedmetadata = r);
      startBtn.disabled = true;
      stopBtn.disabled = false;
      detect();
    };

    stopBtn.onclick = () => {
      if (animationId) cancelAnimationFrame(animationId);
      if (stream) stream.getTracks().forEach(track => track.stop());
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statsEl.textContent = '';
    };

    init();
  </script>
</body>
</html>
