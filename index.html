<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time YOLOv8 Detection</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111;
            color: #fff;
        }
        video, canvas {
            border: 2px solid #0f0;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Real-Time Object Detection (YOLOv8)</h2>
<video id="video" width="640" height="480" autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔥 Your Render backend YOLOv8 endpoint
const API_URL = "https://yolo-detection-1-mjos.onrender.com/detect";

async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

async function sendFrameToBackend() {
    // Draw current frame to temporary canvas
    const offscreen = document.createElement("canvas");
    offscreen.width = video.videoWidth;
    offscreen.height = video.videoHeight;
    offscreen.getContext("2d").drawImage(video, 0, 0);

    // Convert to Base64
    const base64 = offscreen.toDataURL("image/jpeg").split(",")[1];

    try {
        // 🔥 Send JSON as required by your FastAPI backend
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64 })
        });

        const data = await res.json();

        // Draw video on canvas
        ctx.drawImage(video, 0, 0);

        // Draw YOLO detections
        if (data.detections) {
            data.detections.forEach(det => {
                let [x1, y1, x2, y2] = det.bbox;

                ctx.strokeStyle = "lime";
                ctx.lineWidth = 2;
                ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

                ctx.fillStyle = "yellow";
                ctx.font = "16px Arial";
                ctx.fillText(
                    `${det.label} ${det.confidence.toFixed(2)} (${det.width}x${det.height})`,
                    x1,
                    y1 - 10
                );
            });
        }

    } catch (err) {
        console.error("Error:", err);
    }

    requestAnimationFrame(sendFrameToBackend);
}

setupCamera().then(() => {
    video.onloadeddata = () => sendFrameToBackend();
});
</script>

</body>
</html>
